services:
  api:
    build: .
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      - redis
      - postgres

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  postgres:
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: satira
      POSTGRES_PASSWORD: satira
      POSTGRES_DB: satira
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
