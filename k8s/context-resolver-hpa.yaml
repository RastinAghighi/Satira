apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: context-resolver
  labels:
    app: context-resolver
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: context-resolver
  minReplicas: 2
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
