apiVersion: apps/v1
kind: Deployment
metadata:
  name: inference-worker
  labels:
    app: inference-worker
spec:
  replicas: 2
  selector:
    matchLabels:
      app: inference-worker
  template:
    metadata:
      labels:
        app: inference-worker
    spec:
      nodeSelector:
        instance-type: g6.xlarge
      tolerations:
        - key: nvidia.com/gpu
          operator: Exists
          effect: NoSchedule
      containers:
        - name: inference-worker
          image: satira/inference:latest
          ports:
            - containerPort: 8080
          env:
            - name: MAX_BATCH_SIZE
              value: "32"
            - name: BATCH_TIMEOUT_MS
              value: "50"
            - name: REDIS_URL
              valueFrom:
                configMapKeyRef:
                  name: inference-config
                  key: REDIS_URL
          resources:
            requests:
              cpu: "2"
              memory: 4Gi
              nvidia.com/gpu: "1"
            limits:
              cpu: "4"
              memory: 8Gi
              nvidia.com/gpu: "1"
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /ready
              port: 8080
            periodSeconds: 10
